<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Death Store Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: linear-gradient(-45deg, #0a0000, #1a0000, #000, #220000);
  background-size: 400% 400%;
  animation: bg 8s infinite alternate;
}

@keyframes bg {
  0% {background-position: left;}
  100% {background-position: right;}
}

.topo {
  display: none;
  justify-content: space-between;
  padding: 15px;
  background: #000000cc;
  border-bottom: 2px solid red;
}

.login, .container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.login-box {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px red;
}

.game-area {
  width: 300px;
  height: 350px;
  border: 2px solid red;
  border-radius: 20px;
  position: relative;
  overflow: hidden;
  margin-top: 20px;
}

#balao {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 100px;
  background: radial-gradient(circle, red, darkred);
  border-radius: 50%;
}

#multiFloat {
  position: absolute;
  left: 60%;
  bottom: 100px;
  font-weight: bold;
}

button {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  background: red;
  color: white;
  cursor: pointer;
}

.segurar { background: green; }
</style>
</head>

<body>

<div class="login" id="login">
  <div class="login-box">
    <h2>DEATH STORE</h2>
    <input id="keyInput" placeholder="Digite sua KEY">
    <button id="btnEntrar">Entrar</button>
  </div>
</div>

<div class="topo" id="topo">
  💎 <span id="saldo">0</span>
</div>

<div class="container" id="game" style="display:none;">
  <div class="game-area">
    <div id="balao"></div>
    <div id="multiFloat">1.00x</div>
  </div>
  <button id="btnSegurar" class="segurar">SEGURAR</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

let saldo = 1000000;
let multi = 1;
let intervalo = null;
let jogou = false;
let target = 1;

const keys = {
"KEY1":145372,
"KEY2":172918,
"KEY3":108564
};

const balao = document.getElementById("balao");
const multiFloat = document.getElementById("multiFloat");
const btnSegurar = document.getElementById("btnSegurar");
const btnEntrar = document.getElementById("btnEntrar");

function atualizar(){
  document.getElementById("saldo").innerText = saldo.toLocaleString();
}

btnEntrar.addEventListener("click", () => {
  const key = document.getElementById("keyInput").value.trim();

  if(keys[key]){
    target = parseInt(keys[key].toString().substring(0,3)) / 100;

    document.getElementById("login").style.display="none";
    document.getElementById("game").style.display="flex";
    document.getElementById("topo").style.display="flex";

    atualizar();
  } else {
    alert("Key inválida");
  }
});

btnSegurar.addEventListener("mousedown", iniciar);
btnSegurar.addEventListener("mouseup", parar);
btnSegurar.addEventListener("touchstart", iniciar);
btnSegurar.addEventListener("touchend", parar);

function iniciar(){
  if(jogou) return;

  intervalo = setInterval(()=>{
    multi += 0.02;

    if(multi >= target){
      multi = target;
      parar();
    }

    multiFloat.innerText = multi.toFixed(2) + "x";

    let altura = parseInt(balao.style.bottom || 0);
    balao.style.bottom = (altura + 3) + "px";

  },50);
}

function parar(){
  if(jogou) return;
  jogou = true;

  clearInterval(intervalo);

  saldo = Math.floor(saldo * multi);
  alert("💎 Parou em " + multi.toFixed(2) + "x");

  atualizar();
}

});
</script>

</body>
</html>
